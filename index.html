<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skip CRM</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%228%22 fill=%22%232D0949%22/><text x=%2250%22 y=%2270%22 font-size=%2258%22 text-anchor=%22middle%22 fill=%22%23EBB1CC%22 font-family=%22Arial%22 font-weight=%22900%22>S</text></svg>">
<style>
/* ============================================================
   SKIP CRM — Design System v3
   Estética: Linear/Vercel dark — angular, denso, tipografía tight
   Paleta: morado Skip + negro profundo
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  /* Marca */
  --skip-morado:      #7C3AED;
  --skip-morado-dim:  rgba(124,58,237,0.15);
  --skip-rosa:        #EBB1CC;
  --skip-cyan:        #50B1C2;
  --skip-amarillo:    #EFED94;

  /* Superficies — escala muy oscura */
  --bg-app:           #080809;
  --bg-canvas:        #0E0E10;
  --bg-card:          #111113;
  --bg-elevated:      #18181C;
  --bg-hover:         #1E1E24;
  --bg-sunken:        #0A0A0C;

  /* Texto */
  --ink-900:          #EDECF0;
  --ink-700:          #A09DB0;
  --ink-500:          #5C5870;
  --ink-300:          #2E2C3A;

  /* Bordes — casi invisibles, solo percibidos */
  --border:           rgba(255,255,255,0.07);
  --border-strong:    rgba(255,255,255,0.12);
  /* compat aliases */
  --border-soft:      rgba(255,255,255,0.07);
  --bg-dark:          #080809;
  --bg-dark-soft:     #0E0E10;
  --ink-on-dark:      #EDECF0;
  --ink-on-dark-soft: #5C5870;

  /* Semántica */
  --success:          #22C55E;
  --success-bg:       rgba(34,197,94,0.10);
  --warning:          #F59E0B;
  --warning-bg:       rgba(245,158,11,0.10);
  --danger:           #EF4444;
  --danger-bg:        rgba(239,68,68,0.10);
  --info:             #38BDF8;
  --info-bg:          rgba(56,189,248,0.10);
  /* compat */
  --state-success:    #22C55E;
  --state-success-bg: rgba(34,197,94,0.10);
  --state-warning:    #F59E0B;
  --state-warning-bg: rgba(245,158,11,0.10);
  --state-danger:     #EF4444;
  --state-danger-bg:  rgba(239,68,68,0.10);
  --state-info:       #38BDF8;
  --state-info-bg:    rgba(56,189,248,0.10);

  /* Tipografía — Inter, angulosa, sin kerning exagerado */
  --font-display: 'Inter', system-ui, -apple-system, sans-serif;
  --font-body:    'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:    'SF Mono', 'Roboto Mono', monospace;

  /* Radios — mucho más planos que antes */
  --r-sm:   4px;
  --r-md:   6px;
  --r-lg:   8px;
  --r-xl:   10px;
  --r-pill: 4px;   /* pills también angulares */

  /* Sombras */
  --shadow-sm:   0 1px 2px rgba(0,0,0,0.5);
  --shadow-md:   0 4px 12px rgba(0,0,0,0.6);
  --shadow-lg:   0 16px 48px rgba(0,0,0,0.7);
  --shadow-dark: 0 8px 24px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 0 1px rgba(124,58,237,0.4);

  --transition: 120ms cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.5;
  background: var(--bg-app);
  color: var(--ink-900);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.2;
  color: var(--ink-900);
}

button { font-family: var(--font-body); cursor: pointer; }
a { color: inherit; text-decoration: none; }

::selection { background: var(--skip-morado); color: #fff; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 0; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-500); }

:focus-visible { outline: 1px solid var(--skip-morado); outline-offset: 2px; }

input, select, textarea { color-scheme: dark; }

#root { min-height: 100vh; display: flex; }
</style>
</head>

<div id="root"></div>

/* ============================================================
   2. UTILIDADES DE FECHA Y FORMATO
   ============================================================ */

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function parseISO(d) {
  if (!d) return null;
  const dt = new Date(d + 'T00:00:00');
  return isNaN(dt.getTime()) ? null : dt;
}
function diffDays(isoStart, isoEnd) {
  const a = parseISO(isoStart);
  const b = parseISO(isoEnd);
  if (!a || !b) return null;
  return Math.max(0, Math.round((b - a) / 86400000));
}
function formatDate(iso) {
  if (!iso) return '—';
  const d = parseISO(iso);
  if (!d) return '—';
  return d.toLocaleDateString('es-CL', {
    day: '2-digit',
    month: 'short',
    year: 'numeric'
  });
}
function formatDateShort(iso) {
  if (!iso) return '—';
  const d = parseISO(iso);
  if (!d) return '—';
  return d.toLocaleDateString('es-CL', {
    day: '2-digit',
    month: 'short'
  });
}
function monthKey(iso) {
  return iso ? iso.slice(0, 7) : null;
}
function quarterKey(iso) {
  if (!iso) return null;
  const [y, m] = iso.split('-');
  const q = Math.ceil(parseInt(m, 10) / 3);
  return `${y}-T${q}`;
}
function yearKey(iso) {
  return iso ? iso.slice(0, 4) : null;
}
function monthLabel(key) {
  if (!key) return '';
  const [y, m] = key.split('-');
  const meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
  return `${meses[parseInt(m, 10) - 1]} ${y}`;
}
function uid() {
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}
function pct(num, den) {
  if (!den) return null;
  return num / den * 100;
}
function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return v.toFixed(0) + '%';
}
function fmtPct1(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return v.toFixed(1) + '%';
}
function fmtCLP(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + Math.round(n).toLocaleString('es-CL');
}
function normalizar(s) {
  return (s || '').toString().trim().toLowerCase();
}

/* ============================================================
   3. PERSISTENCIA — localStorage
   ============================================================ */

const STORAGE_KEY = 'skip_crm_data_v2';
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.leads)) return null;
    if (!Array.isArray(parsed.prestadores)) parsed.prestadores = [];
    if (!Array.isArray(parsed.campanas)) parsed.campanas = [];
    return parsed;
  } catch (e) {
    console.error('Error leyendo localStorage', e);
    return null;
  }
}
function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    console.error('Error guardando en localStorage', e);
    return false;
  }
}

/* ============================================================
   4. LÓGICA DE LEAD — historial de etapas
   ============================================================ */

function alcanzoEtapa(lead, etapaNombre) {
  const etapas = ETAPAS[lead.tipo];
  const idx = etapas.indexOf(etapaNombre);
  if (idx === -1) return false;
  if (lead.estado === ESTADOS.GANADO) return true;
  return lead.etapaIndex >= idx;
}
function fechaEnEtapa(lead, etapaNombre) {
  return lead.stageDates && lead.stageDates[etapaNombre] || null;
}

// CAC = gasto total en ese canal ese mes / leads convertidos (ganados) desde ese canal ese mes
function calcularCACPorCanal(leads, campanas, tipo, mes) {
  const ganados = leads.filter(l => l.tipo === tipo && l.estado === ESTADOS.GANADO && monthKey(l.fechaCierre) === mes);
  const campanasMes = campanas.filter(c => c.tipo === tipo && c.mes === mes);
  const canales = [...new Set(campanasMes.map(c => c.canal))];
  return canales.map(canal => {
    const gastoCanal = campanasMes.filter(c => c.canal === canal).reduce((s, c) => s + c.monto, 0);
    const convertidosCanal = ganados.filter(l => (l.vertical || l.verticalPrestador) === canal).length;
    return {
      canal,
      gasto: gastoCanal,
      convertidos: convertidosCanal,
      cac: convertidosCanal > 0 ? gastoCanal / convertidosCanal : null

// Dado un periodo ('mensual'|'trimestral'|'anual'), devuelve { actual, anterior }:
// las claves de periodo correspondientes al periodo en curso y al inmediatamente anterior.
function periodoActualYAnterior(periodo) {
  const hoy = todayISO();
  if (periodo === 'mensual') {
    const actual = monthKey(hoy);
    const [y, m] = actual.split('-').map(Number);
    const prevM = m === 1 ? 12 : m - 1;
    const prevY = m === 1 ? y - 1 : y;
    return {
      actual,
      anterior: `${prevY}-${String(prevM).padStart(2, '0')}`
    };
  }
  if (periodo === 'trimestral') {
    const actual = quarterKey(hoy);
    const [y, qStr] = actual.split('-T');
    const q = parseInt(qStr, 10);
    const prevQ = q === 1 ? 4 : q - 1;
    const prevY = q === 1 ? parseInt(y, 10) - 1 : parseInt(y, 10);
    return {
      actual,
      anterior: `${prevY}-T${prevQ}`
    };
  }
  // anual
  const actual = yearKey(hoy);
  return {
    actual,
    anterior: String(parseInt(actual, 10) - 1)
  };
}

// KPIs de un set de leads creados dentro de un periodo dado (filtra por fechaCreacion)
function kpisDelPeriodo(leadsSet, periodKey, keyFn) {
  const enPeriodo = leadsSet.filter(l => keyFn(l.fechaCreacion) === periodKey);
  const total = enPeriodo.length;
  const ganados = enPeriodo.filter(l => l.estado === ESTADOS.GANADO);
  const tasaCierre = pct(ganados.length, total);
  const ciclo = cicloVentaPromedio(enPeriodo);
  return {
    total,
    ganados: ganados.length,
    tasaCierre,
    ciclo
  };
}

// Compara KPIs entre el periodo actual y el anterior para un tipo de cliente.
// Devuelve deltas listos para mostrar como flecha + magnitud.
function compararPeriodos(leads, tipo, periodo) {
  const keyFn = periodKeyFn(periodo);
  const {
    actual,
    anterior
  } = periodoActualYAnterior(periodo);
  const set = leadsDeTipo(leads, tipo);
  const kpiActual = kpisDelPeriodo(set, actual, keyFn);
  const kpiAnterior = kpisDelPeriodo(set, anterior, keyFn);
  const deltaLeads = kpiAnterior.total > 0 ? pct(kpiActual.total - kpiAnterior.total, kpiAnterior.total) : null;
  const deltaTasaCierre = kpiActual.tasaCierre !== null && kpiAnterior.tasaCierre !== null ? kpiActual.tasaCierre - kpiAnterior.tasaCierre // en puntos porcentuales
  : null;
  const deltaCiclo = kpiActual.ciclo !== null && kpiAnterior.ciclo !== null ? kpiActual.ciclo - kpiAnterior.ciclo : null;
  return {
    actual: kpiActual,
    anterior: kpiAnterior,
    deltaLeads,
    deltaTasaCierre,
    deltaCiclo,
    labelActual: periodLabel(actual, periodo),
    labelAnterior: periodLabel(anterior, periodo)
  };
}

// Agrupa leads de un tipo por su campo de origen (vertical, o vertical heredada
// del prestador en B2B2C) y calcula leads totales, ganados, tasa de cierre y ciclo.
function desglosePorVertical(leads, tipo) {
  const set = leadsDeTipo(leads, tipo);
  const campoVertical = tipo === 'B2B2C' ? 'verticalPrestador' : 'vertical';
  const grupos = {};
  set.forEach(l => {
    const key = l[campoVertical] || '(sin vertical)';
    if (!grupos[key]) grupos[key] = [];
    grupos[key].push(l);
  });
  return Object.entries(grupos).map(([vertical, arr]) => {
    const ganados = arr.filter(l => l.estado === ESTADOS.GANADO);
    return {
      vertical,
      total: arr.length,
      ganados: ganados.length,
      tasaCierre: pct(ganados.length, arr.length),
      ciclo: cicloVentaPromedio(arr)
    };
  }).sort((a, b) => (b.tasaCierre || 0) - (a.tasaCierre || 0));
}

// Solo aplica a B2B2C: desglose por prestador individual (no por su vertical).
function desglosePorPrestador(leads, prestadores) {
  const set = leadsDeTipo(leads, 'B2B2C');
  const grupos = {};
  set.forEach(l => {
    const key = l.prestador || '(sin prestador)';
    if (!grupos[key]) grupos[key] = [];
    grupos[key].push(l);
  });
  return Object.entries(grupos).map(([prestador, arr]) => {
    const ganados = arr.filter(l => l.estado === ESTADOS.GANADO);
    const info = buscarPrestadorPorNombre(prestadores, prestador);
    return {
      prestador,
      vertical: info ? info.vertical : arr[0].verticalPrestador || '—',
      total: arr.length,
      ganados: ganados.length,
      tasaCierre: pct(ganados.length, arr.length),
      ciclo: cicloVentaPromedio(arr)
    };
  }).sort((a, b) => (b.tasaCierre || 0) - (a.tasaCierre || 0));
}
