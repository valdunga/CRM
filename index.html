<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skip CRM · Seguimiento de ventas</title>
<meta name="description" content="CRM interno de Skip para seguimiento de leads B2B, B2B2C y B2C.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%232D0949%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22%23EBB1CC%22 font-family=%22Arial%22 font-weight=%22900%22>S</text></svg>">

<style>
/* ============================================================
   SKIP CRM — Design tokens derivados del Manual de Marca Skip
   Morado #2D0949 · Amarillo #EFED94 · Rosa #EBB1CC
   Cyan #50B1C2 · Gris #EBE1E4 · Tipografía Gilroy (fallback system)
   ============================================================ */

@font-face {
  font-family: 'Gilroy';
  src: local('Gilroy');
}

:root {
  /* Marca */
  --skip-morado: #2D0949;
  --skip-morado-soft: #43136B;
  --skip-morado-deep: #1C0530;
  --skip-amarillo: #EFED94;
  --skip-rosa: #EBB1CC;
  --skip-cyan: #50B1C2;
  --skip-gris: #EBE1E4;

  /* Superficies */
  --bg-app: #FAF7F8;
  --bg-canvas: #FFFFFF;
  --bg-sunken: var(--skip-gris);
  --bg-dark: var(--skip-morado);
  --bg-dark-soft: var(--skip-morado-soft);

  /* Texto */
  --ink-900: #1C0530;
  --ink-700: #4A3A57;
  --ink-500: #7A6B85;
  --ink-300: #B3A6BC;
  --ink-on-dark: #F4EFF6;
  --ink-on-dark-soft: #C9B8D4;

  /* Bordes */
  --border-soft: #E8DEE6;
  --border-strong: #D2C3DA;

  /* Estado / semántica (derivados de la paleta, no colores genéricos) */
  --state-success: #3D8F6B;
  --state-success-bg: #E3F2EA;
  --state-warning: #C28A2E;
  --state-warning-bg: #FBF0DD;
  --state-danger: #BD4B5E;
  --state-danger-bg: #FAE5E9;
  --state-info: var(--skip-cyan);
  --state-info-bg: #E5F4F7;

  /* Tipografía */
  --font-display: 'Gilroy', 'Avenir Next', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-body: 'Gilroy', 'Avenir Next', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'SF Mono', 'Roboto Mono', monospace;

  /* Radios y sombras — esquinas redondeadas como el isotipo Skip */
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-pill: 999px;

  --shadow-sm: 0 1px 2px rgba(45,9,73,0.06);
  --shadow-md: 0 4px 16px rgba(45,9,73,0.10);
  --shadow-lg: 0 12px 32px rgba(45,9,73,0.16);
  --shadow-dark: 0 8px 24px rgba(28,5,48,0.35);

  --transition: 180ms cubic-bezier(.4,0,.2,1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-app);
  color: var(--ink-900);
  -webkit-font-smoothing: antialiased;
  line-height: 1.45;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 800;
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--ink-900);
}

button {
  font-family: var(--font-body);
  cursor: pointer;
}

a { color: inherit; }

::selection { background: var(--skip-rosa); color: var(--skip-morado); }

/* Scrollbars discretas */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: var(--r-pill); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-300); }

:focus-visible {
  outline: 2px solid var(--skip-cyan);
  outline-offset: 2px;
  border-radius: 4px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

#root { min-height: 100vh; }
</style>
</head>

<div id="root"></div>

function todayISO() {

function parseISO(d) {

  return isNaN(dt.getTime()) ? null : dt;

function diffDays(isoStart, isoEnd) {
  const a = parseISO(isoStart);
  const b = parseISO(isoEnd);
  if (!a || !b) return null;
  return Math.max(0, Math.round((b - a) / 86400000));

function formatDate(iso) {
  if (!iso) return '—';
  const d = parseISO(iso);
  if (!d) return '—';
  return d.toLocaleDateString('es-CL', {
    day: '2-digit',
    month: 'short',

function monthKey(iso) {
  return iso ? iso.slice(0, 7) : null;
}
function quarterKey(iso) {
  if (!iso) return null;
  const [y, m] = iso.split('-');
  const q = Math.ceil(parseInt(m, 10) / 3);
  return `${y}-T${q}`;
}
function yearKey(iso) {
  return iso ? iso.slice(0, 4) : null;
}
function monthLabel(key) {
  if (!key) return '';
  const [y, m] = key.split('-');
  const meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

}

/* ============================================================
   6. MOTOR DE MÉTRICAS
   ============================================================ */

function leadsDeTipo(leads, tipo) {
  return leads.filter(l => l.tipo === tipo);
}
function tasaConversion(leadsSet, tipo, etapaA, etapaB) {
  const base = leadsSet.filter(l => l.tipo === tipo && alcanzoEtapa(l, etapaA));
  const avanzaron = base.filter(l => alcanzoEtapa(l, etapaB));
  return {
    num: avanzaron.length,
    den: base.length,
    tasa: pct(avanzaron.length, base.length)
  };
}
function cicloVentaPromedio(leadsSet) {
  const ganados = leadsSet.filter(l => l.estado === ESTADOS.GANADO && l.fechaCierre);
  if (ganados.length === 0) return null;
  const dias = ganados.map(l => diffDays(l.fechaCreacion, l.fechaCierre)).filter(d => d !== null);
  if (dias.length === 0) return null;
  return dias.reduce((a, b) => a + b, 0) / dias.length;
}
function tasaCierreGlobal(leadsSet, tipo) {
  const set = leadsSet.filter(l => l.tipo === tipo);
  const total = set.length;
  const ganados = set.filter(l => l.estado === ESTADOS.GANADO).length;
  return {
    num: ganados,
    den: total,
    tasa: pct(ganados, total)
  };
}
function funnelCounts(leadsSet, tipo) {
  const etapas = ETAPAS[tipo];
  return etapas.map(etapa => ({
    etapa,
    count: leadsSet.filter(l => l.tipo === tipo && alcanzoEtapa(l, etapa)).length
  }));
}
function agruparPorPeriodo(leadsSet, keyFn, fechaField) {
  const groups = {};
  leadsSet.forEach(l => {
    const fecha = l[fechaField];
    const key = keyFn(fecha);
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    groups[key].push(l);
  });
  return groups;
}
function periodKeyFn(periodo) {
  if (periodo === 'mensual') return monthKey;
  if (periodo === 'trimestral') return quarterKey;
  return yearKey;
}
function sortPeriodKeys(keys, periodo) {
  return keys.sort((a, b) => {
    if (periodo === 'trimestral') {
      const [ya, qa] = a.split('-T');
      const [yb, qb] = b.split('-T');
      return ya === yb ? qa - qb : ya - yb;
    }
    return a.localeCompare(b);
  });
}
function periodLabel(key, periodo) {
  if (periodo === 'mensual') return monthLabel(key);
  if (periodo === 'trimestral') return key.replace('-', ' ');
  return key;
}

/* ------------------------------------------------------------
   6b. COMPARACIÓN PERIOD-OVER-PERIOD (mes/trimestre/año anterior)
   ------------------------------------------------------------ */

// Dado un periodo ('mensual'|'trimestral'|'anual'), devuelve { actual, anterior }:
// las claves de periodo correspondientes al periodo en curso y al inmediatamente anterior.
function periodoActualYAnterior(periodo) {
  const hoy = todayISO();
  if (periodo === 'mensual') {
    const actual = monthKey(hoy);
    const [y, m] = actual.split('-').map(Number);
    const prevM = m === 1 ? 12 : m - 1;
    const prevY = m === 1 ? y - 1 : y;
    return {
      actual,
      anterior: `${prevY}-${String(prevM).padStart(2, '0')}`
    };
  }
  if (periodo === 'trimestral') {
    const actual = quarterKey(hoy);
    const [y, qStr] = actual.split('-T');
    const q = parseInt(qStr, 10);
    const prevQ = q === 1 ? 4 : q - 1;
    const prevY = q === 1 ? parseInt(y, 10) - 1 : parseInt(y, 10);
    return {
      actual,
      anterior: `${prevY}-T${prevQ}`
    };
  }
  // anual
  const actual = yearKey(hoy);
  return {
    actual,
    anterior: String(parseInt(actual, 10) - 1)
  };
}

// KPIs de un set de leads creados dentro de un periodo dado (filtra por fechaCreacion)
function kpisDelPeriodo(leadsSet, periodKey, keyFn) {
  const enPeriodo = leadsSet.filter(l => keyFn(l.fechaCreacion) === periodKey);
  const total = enPeriodo.length;
  const ganados = enPeriodo.filter(l => l.estado === ESTADOS.GANADO);
  const tasaCierre = pct(ganados.length, total);
  const ciclo = cicloVentaPromedio(enPeriodo);
  return {
    total,
    ganados: ganados.length,
    tasaCierre,
    ciclo
  };
}

// Compara KPIs entre el periodo actual y el anterior para un tipo de cliente.
// Devuelve deltas listos para mostrar como flecha + magnitud.
function compararPeriodos(leads, tipo, periodo) {
  const keyFn = periodKeyFn(periodo);
  const {
    actual,
    anterior
  } = periodoActualYAnterior(periodo);
  const set = leadsDeTipo(leads, tipo);
  const kpiActual = kpisDelPeriodo(set, actual, keyFn);
  const kpiAnterior = kpisDelPeriodo(set, anterior, keyFn);
  const deltaLeads = kpiAnterior.total > 0 ? pct(kpiActual.total - kpiAnterior.total, kpiAnterior.total) : null;
  const deltaTasaCierre = kpiActual.tasaCierre !== null && kpiAnterior.tasaCierre !== null ? kpiActual.tasaCierre - kpiAnterior.tasaCierre // en puntos porcentuales
  : null;
  const deltaCiclo = kpiActual.ciclo !== null && kpiAnterior.ciclo !== null ? kpiActual.ciclo - kpiAnterior.ciclo : null;
  return {
    actual: kpiActual,
    anterior: kpiAnterior,
    deltaLeads,
    deltaTasaCierre,
    deltaCiclo,
    labelActual: periodLabel(actual, periodo),
    labelAnterior: periodLabel(anterior, periodo)
  };
}

/* ------------------------------------------------------------
   6c. DESGLOSE POR CANAL (vertical) Y POR PRESTADOR
   ------------------------------------------------------------ */

// Agrupa leads de un tipo por su campo de origen (vertical, o vertical heredada
// del prestador en B2B2C) y calcula leads totales, ganados, tasa de cierre y ciclo.
function desglosePorVertical(leads, tipo) {
  const set = leadsDeTipo(leads, tipo);
  const campoVertical = tipo === 'B2B2C' ? 'verticalPrestador' : 'vertical';
  const grupos = {};
  set.forEach(l => {
    const key = l[campoVertical] || '(sin vertical)';
    if (!grupos[key]) grupos[key] = [];
